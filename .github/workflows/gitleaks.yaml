name: Gitleaks Scan
on:
  push:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout code 
        uses: actions/checkout@v4
        
      - name: Gitleaks run
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose